name: Add business information to footer

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/add-business-info-footer.yml'

permissions:
  contents: write

jobs:
  update-footer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add business information
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          old = '''    <div style="margin-top:8px">
      <a href="https://litt.ly/stargateedu" target="_blank" rel="noopener">litt.ly/stargateedu</a>
      &nbsp;·&nbsp;
      <a href="mailto:ceo@stargateedu.co.kr">ceo@stargateedu.co.kr</a>
    </div>'''
          new = '''    <div style="margin-top:8px">
      <a href="https://litt.ly/stargateedu" target="_blank" rel="noopener">litt.ly/stargateedu</a>
      &nbsp;·&nbsp;
      <a href="mailto:ceo@stargateedu.co.kr">ceo@stargateedu.co.kr</a>
    </div>
    <div style="margin:18px auto 0;padding-top:16px;max-width:760px;border-top:1px solid rgba(217,164,65,.2);color:#858fad;font-size:11.5px;line-height:1.8">
      <div>상호 : 스타게이트</div>
      <div>사업자등록번호 : 848-86-03835 &nbsp;·&nbsp; 사업자등록번호 : 371-99-01827</div>
      <div>통신판매업 신고번호 : 2025-강남-5277</div>
    </div>'''
          if old not in text:
              raise SystemExit('Footer link block not found')
          text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove one-time workflow and publish
        run: |
          rm .github/workflows/add-business-info-footer.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/add-business-info-footer.yml
          git commit -m "메인 페이지 푸터에 사업자 정보 추가"
          git push
