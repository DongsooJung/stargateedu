name: Add consult link to main page

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/add-consult-main-link.yml'

permissions:
  contents: write

jobs:
  update-main-page:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add consultation links
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          replacements = [
              (
                  '      <li><a href="#contact">연락처</a></li>',
                  '      <li><a href="#contact">연락처</a></li>\n      <li><a href="/consult/" style="color:var(--gold-2);font-weight:700">상담 신청</a></li>'
              ),
              (
                  '    <a class="cta" href="https://litt.ly/stargateedu" target="_blank" rel="noopener">리틀리 바로가기 →</a>',
                  '    <a class="cta" href="/consult/">1:1 상담 신청 →</a>'
              ),
              (
                  '      <a class="btn btn-primary" href="https://litt.ly/stargateedu" target="_blank" rel="noopener">🔗 리틀리 링크 허브</a>',
                  '      <a class="btn btn-primary" href="/consult/">✨ 1:1 상담 신청</a>\n      <a class="btn btn-ghost" href="https://litt.ly/stargateedu" target="_blank" rel="noopener">🔗 리틀리 링크 허브</a>'
              ),
              (
                  '    <div class="hub-grid">\n      <a class="link primary" href="https://litt.ly/stargateedu" target="_blank" rel="noopener">',
                  '    <div class="hub-grid">\n      <a class="link primary" href="/consult/">\n        <div><div class="t">✨ KOI·수학 1:1 상담 신청</div><div class="s">카카오·네이버 간편 로그인 · 연락처 직접 입력</div></div>\n        <span class="arrow">→</span>\n      </a>\n\n      <a class="link" href="https://litt.ly/stargateedu" target="_blank" rel="noopener">'
              ),
              (
                  '        <p style="color:var(--muted);margin-top:10px">가장 빠른 답변: CEO 직통 이메일로 연락 주시기 바랍니다. 일반적으로 24시간 이내 회신을 드립니다.</p>',
                  '        <p style="color:var(--muted);margin-top:10px">온라인 상담 신청서를 작성하거나 CEO 직통 이메일로 문의해 주세요. 일반적으로 영업일 기준 24시간 이내 연락드립니다.</p>\n        <a class="email-btn" href="/consult/" style="background:var(--gold);color:var(--navy);margin-right:8px">✨ 온라인 상담 신청</a>'
              ),
          ]

          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'Expected snippet not found: {old[:80]}')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove one-time workflow and publish
        run: |
          rm .github/workflows/add-consult-main-link.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/add-consult-main-link.yml
          git commit -m "메인 페이지에 상담 신청 링크 추가"
          git push
